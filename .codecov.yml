coverage:
  # Minimum project-wide coverage before Codecov reports a failure.
  # Start permissive; tighten once coverage grows above these floors.
  # These statuses are informational — the hard regression gate is the
  # vitest coverage thresholds in vitest.config.ts (fails the CI job itself).
  status:
    project:
      default:
        target: 50%
        threshold: 2% # allow up to 2 pp drop before failing
    patch:
      default:
        target: 60% # new code in a PR should be ≥ 60% covered

  # Files / paths excluded from coverage accounting.
ignore:
  - 'src/**/*.d.ts'
  - 'src/**/index.ts' # barrel re-exports add noise, not signal
  - 'packages/*/src/**/*.d.ts'
  - 'packages/*/src/**/index.ts'
  - 'scripts/**'
  - 'test/**'
  - 'packages/*/test/**'
  - 'site/**'

comment:
  layout: 'reach,diff,flags,components,files'
  behavior: default
  require_changes: true # only comment when coverage actually changes

# Upload flags — one per CI lane that uploads (see _ci-checks.yml).
flags:
  unit:
    paths:
      - src/
      - packages/
    carryforward: true
  # Istanbul coverage collected by the Chromium-WebGL2 browser lane — the
  # only lane that executes the real GPU backend paths (src/rendering/webgl2,
  # webgpu bootstrap, browser-only branches). Merged with `unit` into the
  # overall number; carryforward keeps it for commits whose CI run skips the
  # browser lane.
  browser:
    paths:
      - src/
      - packages/
    carryforward: true

# Per-package coverage breakdown in the PR comment and dashboard.
# Components are pure reporting slices over the merged uploads (`unit` +
# `browser`) — no extra uploads needed.
component_management:
  default_rules:
    statuses: [] # informational only — no per-component commit statuses
  individual_components:
    - component_id: core
      name: core
      paths:
        - src/**
    - component_id: particles
      name: particles
      paths:
        - packages/exojs-particles/src/**
    - component_id: tilemap
      name: tilemap
      paths:
        - packages/exojs-tilemap/src/**
    - component_id: tiled
      name: tiled
      paths:
        - packages/exojs-tiled/src/**
    - component_id: physics
      name: physics
      paths:
        - packages/exojs-physics/src/**
    - component_id: audio-fx
      name: audio-fx
      paths:
        - packages/exojs-audio-fx/src/**
