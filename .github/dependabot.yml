version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
    groups:
      # Lockstep families: these must move together. A minor bump of `vitest`
      # without `@vitest/browser` (or `typescript-eslint` without `eslint`)
      # produces a PR that fails CI on version skew. Grouped across patch AND
      # minor; listed before patch-only so they win the match.
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'eslint-plugin-*'
          - 'eslint-config-*'
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: '/examples'
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
      - examples
    groups:
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: 'Europe/Berlin'
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
      - github-actions
    groups:
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
