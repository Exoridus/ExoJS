version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
    groups:
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: '/examples'
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
      - examples
    groups:
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: 'Europe/Berlin'
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    labels:
      - dependencies
      - github-actions
    groups:
      patch-only:
        update-types:
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
