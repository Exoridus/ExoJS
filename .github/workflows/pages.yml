name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build examples site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install library dependencies
        run: npm ci --ignore-scripts --no-audit --fund=false

      - name: Build library
        run: npm run build

      - name: Install examples dependencies
        working-directory: examples
        run: npm install --no-audit --fund=false

      - name: Build examples site
        working-directory: examples
        run: npm run build

      - name: Stage Pages artifact (latest/ subpath + root redirect)
        run: |
          mkdir -p _site/latest
          cp -r examples/dist/. _site/latest/
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./latest/">
              <link rel="canonical" href="./latest/">
              <title>ExoJS Examples</title>
            </head>
            <body>
              <p>Redirecting to the <a href="./latest/">latest</a> examples site&hellip;</p>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
