name: CI Checks

# Reusable workflow with parallel quality gates (typecheck, lint, unit tests,
# browser tests), plus package verification and a final site build gate.
#
# Called by ci.yml and release.yml so both use exactly the same gate.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version passed to setup-node'
        type: string
        default: '24.x'
      ref:
        description: 'Git ref to check out (empty = triggering commit)'
        type: string
        default: ''
      pnpm-version:
        description: 'pnpm version spec (e.g. 11.4.0, 11, latest)'
        type: string
        default: '11.4.0'

permissions:
  contents: read
  # Codecov action posts a coverage comment on PRs.
  pull-requests: write

env:
  CI: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      engine: ${{ steps.decide.outputs.engine }}
      site: ${{ steps.decide.outputs.site }}
      audioFx: ${{ steps.decide.outputs.audioFx }}
      tilemapWorker: ${{ steps.decide.outputs.tilemapWorker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      # On pull requests, list every changed file (dorny/paths-filter resolves
      # the base / merge-base robustly) and hand the list to
      # scripts/ci/select-lanes.mjs, which decides the effective lanes. Pushes to
      # main, tag releases (via release.yml) and manual dispatches skip this step;
      # select-lanes then runs every lane, so a release is never partially
      # checked.
      #
      # The path-to-lane mapping lives in scripts/ci/select-lanes.mjs — NOT in
      # this YAML — so it is a single source of truth that
      # test/ci/select-lanes.test.ts can assert deterministically.
      - name: List changed files
        id: changed
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          list-files: json
          filters: |
            all:
              - '**'

      - name: Decide effective lanes
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_FILES: ${{ steps.changed.outputs.all_files }}
        # Dependency-free ESM, run with the runner's ambient node — deliberately
        # no pnpm install in this always-on detector job.
        run: node scripts/ci/select-lanes.mjs >> "$GITHUB_OUTPUT"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck guides
        run: pnpm typecheck:guides

      # Keep this job's typecheck set 1:1 with the local verify:quick pre-push
      # hook, which also typechecks examples (strict config) and the
      # standalone type-tests project — a required-CI gate weaker than the
      # local hook lets a class of error merge that then blocks every
      # contributor's next push.
      - name: Typecheck examples
        run: pnpm typecheck:examples

      - name: Typecheck type-tests
        run: pnpm typecheck:type-tests

      # Root `pnpm typecheck` only covers src/**; the extension packages own a
      # separate tsconfig each, so typecheck them explicitly.
      - name: Typecheck extension packages
        run: pnpm --filter "@codexo/exojs-particles" --filter "@codexo/exojs-tilemap" --filter "@codexo/exojs-tiled" --filter "@codexo/exojs-physics" --filter "@codexo/exojs-audio-fx" --filter "@codexo/exojs-aseprite" --filter "@codexo/exojs-ldtk" --filter "@codexo/exojs-react" typecheck

  # Validates the published-manifest shape (exports map, files allowlist,
  # peer/dev-dependency split, no `workspace:` leaks, ...) of every official
  # runtime package via `@codexo/exojs-config/package-policy`. Pure Node, no
  # third-party deps and no build required, so it stays ungated (like
  # typecheck/lint) instead of waiting on the `build` job's dist artifact.
  package-policy:
    name: Package Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify package policy
        run: pnpm verify:package-policy

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint:all

      # Prettier is enforced by the pre-push hook (verify:release), but hooks can
      # be bypassed (--no-verify) and merged PRs were never format-gated, so
      # formatting drifted across the v0.13 PRs and blocked the v0.13.0 tag push.
      # This is the CI backstop. Auto-fixable: a failure means `pnpm format`.
      - name: Format check
        run: pnpm format:check

  unit-tests:
    name: Unit Tests (Coverage)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # NOTE: no `--` before the extra args — pnpm (unlike npm) forwards a
      # literal `--` to the script, and vitest silently discards everything
      # after it (the junit reporter args here were dropped that way for
      # months; the analytics upload below only warned, never failed).
      - name: Test (with coverage)
        run: pnpm test:coverage --reporter=default --reporter=junit --outputFile.junit=./test-results/unit.junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.2
        with:
          files: ./coverage/lcov.info
          flags: unit
          # Loud on purpose when a token is present (the upload failed silently
          # for months and nobody noticed), but non-fatal when it is absent:
          # Dependabot / fork PRs run without repository secrets, so a strict
          # upload would fail Required CI on a green test run (only the codecov
          # step fails: "Token required because branch is protected").
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Exoridus/ExoJS

      # Test Analytics (flaky detection, failure rates, slowest tests). Runs
      # even when the test step failed — capturing failures is the point.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./test-results/unit.junit.xml
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  browser-tests:
    name: Browser Tests
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Istanbul instrumentation is enabled so the real GPU-backend lines this
      # lane executes count toward the Codecov number (the jsdom `unit` flag
      # can never reach them). The global vitest coverage thresholds are the
      # jsdom ratchet — zero them here, this lane only *collects* coverage.
      # No `--` before the args (see the unit-tests step note).
      - name: Browser tests (Chromium WebGL2, new headless)
        run: >-
          pnpm test:browser:webgl
          --reporter=default --reporter=junit --outputFile.junit=./test-results/browser-webgl.junit.xml
          --coverage --coverage.reporter=lcov --coverage.reporter=text-summary
          --coverage.thresholds.statements=0 --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0 --coverage.thresholds.lines=0

      - name: Upload coverage to Codecov (browser flag)
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.2
        with:
          files: ./coverage/lcov.info
          flags: browser
          # Non-fatal without a token (Dependabot / fork PRs) — see the unit
          # coverage upload above for the rationale.
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./test-results/browser-webgl.junit.xml
          flags: browser-webgl
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Blocking lane. Chromium WebGPU is run against Mesa lavapipe (a real Vulkan
  # software rasterizer) instead of Chromium's bundled SwiftShader WebGPU
  # fallback — the three.js-proven recipe for getting actual GPU-path coverage
  # out of a free `ubuntu-latest` runner (no Docker / self-hosted runner
  # needed). `mesa-vulkan-drivers` provides the lavapipe ICD, `VK_DRIVER_FILES`
  # points Chromium's ANGLE Vulkan backend at it, and the launch args in
  # `vitest.config.ts` (`--enable-features=Vulkan`, `--disable-vulkan-surface`)
  # are required for Chromium to actually pick up a Vulkan adapter instead of
  # silently falling back to SwiftShader. lavapipe additionally needs a real
  # display surface to report a usable adapter, so this job sets
  # `EXOJS_WEBGPU_CI_HEADED=1` (opts the `browser-webgpu` vitest project into
  # `headless: false`) and runs under `xvfb-run` to supply that display — CI
  # only; the project stays headless by default so a plain local
  # `pnpm test:browser:webgpu` never pops a visible browser window. Previously
  # this lane self-skipped almost everything via `getBackendDeviceOrSkip()`
  # under SwiftShader and was `continue-on-error`, so it reported green
  # without proving anything; it is now a real, blocking WebGPU lane.
  browser-tests-webgpu-chromium:
    name: Browser Tests (Chromium WebGPU)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
      # Opts the `browser-webgpu` vitest project into `headless: false` (see
      # vitest.config.ts). Unset locally, so `pnpm test:browser:webgpu` stays
      # headless by default and never pops a visible browser window on a dev box.
      EXOJS_WEBGPU_CI_HEADED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install Mesa lavapipe + xvfb
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # No `--` before the args (see the unit-tests step note).
      - name: Browser tests (Chromium WebGPU, Mesa lavapipe via xvfb)
        run: xvfb-run -a pnpm test:browser:webgpu --reporter=default --reporter=junit --outputFile.junit=./test-results/browser-webgpu.junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./test-results/browser-webgpu.junit.xml
          flags: browser-webgpu
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Optional, non-blocking lane. The Ubuntu CI runner does not give headless
  # Firefox a usable WebGL2 context, and Firefox WebGPU adapter availability
  # varies by runner/display setup. Both Firefox lanes are experimental and
  # kept out of the required gate: a failure here never blocks a merge.
  # Real Firefox coverage runs locally via
  # `pnpm test:browser:webgl:firefox` / `pnpm test:browser:webgpu:firefox`.
  browser-tests-firefox:
    name: Browser Tests (Firefox, experimental)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps firefox

      - name: Browser tests (Firefox WebGL2, headless)
        continue-on-error: true
        run: pnpm test:browser:webgl:firefox

      - name: Browser tests (Firefox WebGPU, headed)
        continue-on-error: true
        run: pnpm test:browser:webgpu:firefox

  # Renders the audio-fx worklet effects (PitchShift/Vocoder/Granular) through a
  # real OfflineAudioContext + AudioWorklet in headless Chromium — the acoustic
  # contract layer the jsdom mock cannot cover. Path-gated to `audioFx` so it
  # only runs when the audio-fx package (or a shared root) changes; required
  # (blocking) on those PRs because it exercises our own DSP.
  browser-tests-audio:
    name: Browser Tests (Audio)
    needs: [changes]
    if: ${{ needs.changes.outputs.audioFx == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (audio, headless Chromium)
        run: pnpm test:browser:audio --reporter=default --reporter=junit --outputFile.junit=./test-results/browser-audio.junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./test-results/browser-audio.junit.xml
          flags: browser-audio
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Runs WorkerSampledChunkSource's real-Worker round trip in headless Chromium
  # — jsdom implements neither Worker nor URL.createObjectURL. Path-gated to
  # `tilemapWorker` so it only runs when exojs-tilemap (or a shared root)
  # changes; required (blocking) on those PRs because it exercises our own
  # worker-transport logic.
  browser-tests-tilemap-worker:
    name: Browser Tests (Tilemap Worker)
    needs: [changes]
    if: ${{ needs.changes.outputs.tilemapWorker == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (tilemap worker, headless Chromium)
        run: pnpm test:browser:tilemap --reporter=default --reporter=junit --outputFile.junit=./test-results/browser-tilemap-worker.junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: ./test-results/browser-tilemap-worker.junit.xml
          flags: browser-tilemap-worker
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Builds the core package and all extension packages exactly once, then
  # publishes the resulting dist trees as a shared artifact. `package-verify`
  # and `site-build` both consume this artifact instead of each rebuilding the
  # library themselves — this collapses what used to be a serial
  # `lint -> package-verify (builds) -> site-build (rebuilds)` critical path
  # into a single build that the two downstream jobs can consume in parallel.
  build:
    name: Build
    needs: [changes]
    # Gated on engine OR site (not just engine): a site-only change still
    # needs the library built, because `site:build`'s vendor:sync reads from
    # the built dist/ tree. `needs: [changes]` only (not typecheck/lint) so
    # this build runs in parallel with those gates rather than after them — a
    # wasted build on a rare lint/typecheck failure is an acceptable trade for
    # the parallelism, since required-ci fails on typecheck/lint regardless.
    if: ${{ needs.changes.outputs.engine == 'true' || needs.changes.outputs.site == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build core
        env:
          # Enables the Codecov bundle-analysis upload in rollup.config.ts;
          # absent (e.g. fork PRs, local builds) the build stays offline.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          # Also build + track the all-in-one bundle (core + every extension)
          # so Codecov's Bundles tab carries the "everything together" number.
          EXOJS_FULL_BUNDLE: '1'
        run: pnpm build

      # The extension packages each have their own rollup build; pnpm runs them
      # in workspace-dependency order (tilemap before tiled).
      - name: Build extension packages
        env:
          # Per-package bundle-analysis uploads (see exojs-config/rollup).
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: pnpm --filter "@codexo/exojs-particles" --filter "@codexo/exojs-tilemap" --filter "@codexo/exojs-tiled" --filter "@codexo/exojs-physics" --filter "@codexo/exojs-audio-fx" --filter "@codexo/exojs-aseprite" --filter "@codexo/exojs-ldtk" --filter "@codexo/exojs-react" build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            packages/*/dist/
          retention-days: 1
          if-no-files-found: error

  package-verify:
    name: Package Build + Verify
    needs: [changes, build]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Restores dist/ + packages/*/dist/ (built once by the `build` job)
      # instead of rebuilding here.
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Check bundle sizes
        run: pnpm size

      - name: Verify core package exports
        run: pnpm verify:exports

      # Lockstep versions + peer-range coherence + deterministic publish-order
      # matrix across all four published packages (the same gates release.yml
      # runs before a publish).
      - name: Verify lockstep versions and peer ranges
        run: pnpm verify:lockstep

      - name: Verify release publish matrix
        run: pnpm verify:release-matrix

      - name: Core package dry run
        run: pnpm pack --dry-run

      # Pack each extension package (dry run) so a broken `files`/`exports` set in
      # a package manifest is caught here, not at release time.
      - name: Extension package dry runs
        run: pnpm --filter "@codexo/exojs-particles" --filter "@codexo/exojs-tilemap" --filter "@codexo/exojs-tiled" --filter "@codexo/exojs-physics" --filter "@codexo/exojs-audio-fx" --filter "@codexo/exojs-aseprite" --filter "@codexo/exojs-ldtk" --filter "@codexo/exojs-react" pack --dry-run

      # publint validates the published package.json itself (exports map, files,
      # types resolution, module/main coherence) — the layer attw does NOT cover
      # (attw checks .d.ts resolution; publint checks the manifest contract).
      # Pinned + via dlx (no permanent dependency), matching the attw pattern.
      # Runs against the built dist of each package (core + extensions built above).
      - name: Validate published package manifests (publint)
        run: pnpm verify:publint

      # Verify commit-tracked API docs match a fresh generation from source.
      # (dry-run check that leaves the working tree unchanged.)
      - name: Check API doc sync
        run: pnpm docs:api:check

  release-dry-run:
    name: Release dry run
    # PR-only shift-left of the build-once release `prepare` (pack -> attw ->
    # external consumers). Every tooling bug that broke the v0.13.0 release —
    # tilemap missing from the pack set, attw output-format drift — would have
    # failed HERE on a cheap PR instead of mid-flight on an irreversible tag.
    # `--skip-zip` avoids the site build + 220 MB archive. It does NOT run the
    # real publish (provenance / dist-tag need real OIDC), so the
    # repository-field/provenance prerequisite is covered by verify:release-matrix
    # instead. The tag/release context skips this — release.yml runs the real
    # prepare there. Path-filtered to release-relevant changes so most PRs skip it.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter release-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            release:
              - 'scripts/release/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'packages/*/package.json'
              - '.github/workflows/release.yml'

      - name: Setup pnpm
        if: steps.filter.outputs.release == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        if: steps.filter.outputs.release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.filter.outputs.release == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Release prepare (build-once, no publish, no full-zip)
        if: steps.filter.outputs.release == 'true'
        run: pnpm release:prepare --build --skip-zip

  site-build:
    name: Site build
    # Runs whenever site/examples/packages changed. Depends only on `build`
    # (not `package-verify`) so it runs in parallel with package-verify
    # instead of serially after it; it still won't waste a site build if the
    # shared build failed.
    needs: [changes, build]
    if: ${{ !cancelled() && needs.changes.outputs.site == 'true' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Root install is required because the site consumes the local
      # workspace package and vendor:sync reads from the built dist/ tree.
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Restores dist/ + packages/*/dist/ (built once by the `build` job)
      # instead of rebuilding here.
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      # Site build = vendor:sync + examples:sync + astro build.
      - name: Build site
        env:
          EXOJS_PACKAGE_PATH: ..
          # Enables the Codecov bundle-analysis upload in astro.config.ts.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: pnpm site:build

  required-ci:
    name: Required CI
    if: ${{ always() }}
    needs:
      [
        changes,
        typecheck,
        lint,
        package-policy,
        unit-tests,
        browser-tests,
        browser-tests-webgpu-chromium,
        browser-tests-audio,
        browser-tests-tilemap-worker,
        build,
        package-verify,
        site-build,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate required job results
        env:
          ENGINE: ${{ needs.changes.outputs.engine }}
          SITE: ${{ needs.changes.outputs.site }}
          AUDIOFX: ${{ needs.changes.outputs.audioFx }}
          TILEMAPWORKER: ${{ needs.changes.outputs.tilemapWorker }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          PACKAGE_POLICY_RESULT: ${{ needs['package-policy'].result }}
          UNIT_TESTS_RESULT: ${{ needs['unit-tests'].result }}
          BROWSER_TESTS_RESULT: ${{ needs['browser-tests'].result }}
          BROWSER_WEBGPU_RESULT: ${{ needs['browser-tests-webgpu-chromium'].result }}
          BROWSER_AUDIO_RESULT: ${{ needs['browser-tests-audio'].result }}
          BROWSER_TILEMAP_WORKER_RESULT: ${{ needs['browser-tests-tilemap-worker'].result }}
          BUILD_RESULT: ${{ needs.build.result }}
          PACKAGE_VERIFY_RESULT: ${{ needs['package-verify'].result }}
          SITE_BUILD_RESULT: ${{ needs['site-build'].result }}
        run: |
          echo "areas: engine=$ENGINE site=$SITE audioFx=$AUDIOFX tilemapWorker=$TILEMAPWORKER"
          echo "changes: $CHANGES_RESULT"
          echo "typecheck: $TYPECHECK_RESULT"
          echo "lint: $LINT_RESULT"
          echo "package-policy: $PACKAGE_POLICY_RESULT"
          echo "unit-tests: $UNIT_TESTS_RESULT"
          echo "browser-tests: $BROWSER_TESTS_RESULT"
          echo "browser-tests-webgpu-chromium: $BROWSER_WEBGPU_RESULT"
          echo "browser-tests-audio: $BROWSER_AUDIO_RESULT"
          echo "browser-tests-tilemap-worker: $BROWSER_TILEMAP_WORKER_RESULT"
          echo "build: $BUILD_RESULT"
          echo "package-verify: $PACKAGE_VERIFY_RESULT"
          echo "site-build: $SITE_BUILD_RESULT"

          failed=0

          # The change detector must run — a skipped detector would silently
          # false-green every downstream lane.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::Detect changes did not succeed (result: $CHANGES_RESULT)."
            failed=1
          fi

          # A real "failure" or "cancelled" in any required lane fails the gate.
          # "skipped" is tolerated HERE because path filtering can legitimately
          # skip a whole area (a docs-only PR skips the engine lanes; an
          # engine-only PR skips the site build). Wrongly-skipped IMPACTED lanes
          # are caught by the contract checks below.
          for entry in \
            "typecheck=$TYPECHECK_RESULT" \
            "lint=$LINT_RESULT" \
            "package-policy=$PACKAGE_POLICY_RESULT" \
            "unit-tests=$UNIT_TESTS_RESULT" \
            "browser-tests=$BROWSER_TESTS_RESULT" \
            "browser-tests-webgpu-chromium=$BROWSER_WEBGPU_RESULT" \
            "browser-tests-audio=$BROWSER_AUDIO_RESULT" \
            "browser-tests-tilemap-worker=$BROWSER_TILEMAP_WORKER_RESULT" \
            "build=$BUILD_RESULT" \
            "package-verify=$PACKAGE_VERIFY_RESULT" \
            "site-build=$SITE_BUILD_RESULT"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Required job '$name' $result."
              failed=1
            fi
          done

          # Contract enforcement (the core of this fix): when the detector
          # classifies a change as engine-impacting, the engine lanes MUST have
          # run. A "skipped" here means the path filter wrongly excluded an
          # impacted change — exactly the defect that let package-only PRs go
          # green while their unit / package / browser lanes were skipped.
          # `browser-tests-webgpu-chromium` shares the same `engine` gate as
          # `browser-tests` / `unit-tests` / `package-verify` (see its `if:`
          # above), so it belongs in this same contract check rather than a
          # bespoke one like `browser-tests-audio`'s (audio-fx has its own,
          # narrower path-filter flag).
          if [ "$ENGINE" = "true" ]; then
            for entry in \
              "unit-tests=$UNIT_TESTS_RESULT" \
              "browser-tests=$BROWSER_TESTS_RESULT" \
              "browser-tests-webgpu-chromium=$BROWSER_WEBGPU_RESULT" \
              "build=$BUILD_RESULT" \
              "package-verify=$PACKAGE_VERIFY_RESULT"; do
              name="${entry%%=*}"
              result="${entry#*=}"
              if [ "$result" = "skipped" ]; then
                echo "::error::Engine change detected but required lane '$name' was skipped (path-filter regression)."
                failed=1
              fi
            done
          fi

          # An audio-fx change must run the browser-audio lane.
          if [ "$AUDIOFX" = "true" ] && [ "$BROWSER_AUDIO_RESULT" = "skipped" ]; then
            echo "::error::Audio-fx change detected but 'browser-tests-audio' was skipped (path-filter regression)."
            failed=1
          fi

          # A tilemap-worker change must run the browser-tilemap-worker lane.
          if [ "$TILEMAPWORKER" = "true" ] && [ "$BROWSER_TILEMAP_WORKER_RESULT" = "skipped" ]; then
            echo "::error::Tilemap-worker change detected but 'browser-tests-tilemap-worker' was skipped (path-filter regression)."
            failed=1
          fi

          # Likewise a site-impacting change must build the site — unless the
          # package build failed first, in which case site-build is intentionally
          # skipped and the package-verify failure is already counted above.
          if [ "$SITE" = "true" ] && [ "$PACKAGE_VERIFY_RESULT" != "failure" ]; then
            if [ "$SITE_BUILD_RESULT" = "skipped" ]; then
              echo "::error::Site change detected but 'site-build' was skipped (path-filter regression)."
              failed=1
            fi
          fi

          if [ "$failed" -ne 0 ]; then
            echo "::error::At least one required CI check failed, was cancelled, or was wrongly skipped."
            exit 1
          fi
          echo "All required CI checks satisfied."
