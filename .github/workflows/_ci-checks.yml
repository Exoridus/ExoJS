name: CI Checks

# Reusable workflow with parallel quality gates (typecheck, lint, unit tests,
# browser tests), plus package verification and a final site build gate.
#
# Called by ci.yml and release.yml so both use exactly the same gate.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version passed to setup-node'
        type: string
        default: '24.x'
      ref:
        description: 'Git ref to check out (empty = triggering commit)'
        type: string
        default: ''
      pnpm-version:
        description: 'pnpm version spec (e.g. 11.4.0, 11, latest)'
        type: string
        default: '11.4.0'

permissions:
  contents: read
  # Codecov action posts a coverage comment on PRs.
  pull-requests: write

env:
  CI: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      engine: ${{ steps.decide.outputs.engine }}
      site: ${{ steps.decide.outputs.site }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      # Path filtering only narrows pull-request runs. Pushes to main, tag
      # releases (via release.yml), and manual dispatches skip this step and
      # fall through to the "run everything" branch below, so a release is
      # never partially checked.
      - name: Filter changed paths
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            engine:
              - 'src/**'
              - 'test/**'
              - 'scripts/**'
              - 'rollup.config.ts'
              - 'vitest.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.test.json'
              - 'tsconfig.eslint.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
            site:
              - 'site/**'
              - 'examples/**'
              - 'packages/**'
              - 'tsconfig.guides.json'
              - 'tsconfig.examples.json'
              - 'tsconfig.eslint.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

      - name: Decide effective lanes
        id: decide
        env:
          FILTER_OUTCOME: ${{ steps.filter.outcome }}
          FILTER_ENGINE: ${{ steps.filter.outputs.engine }}
          FILTER_SITE: ${{ steps.filter.outputs.site }}
        run: |
          if [ "$FILTER_OUTCOME" = "success" ]; then
            engine="$FILTER_ENGINE"
            site="$FILTER_SITE"
          else
            # Not a pull request (push to main, tag release, dispatch): run all lanes.
            engine=true
            site=true
          fi
          echo "engine=$engine" >> "$GITHUB_OUTPUT"
          echo "site=$site" >> "$GITHUB_OUTPUT"
          echo "Effective lanes — engine=$engine site=$site"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck guides
        run: pnpm typecheck:guides

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

  unit-tests:
    name: Unit Tests (Coverage)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Exoridus/ExoJS

  browser-tests:
    name: Browser Tests
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (Chromium WebGL2, new headless)
        run: pnpm test:browser:webgl

  # Optional, non-blocking lane. Chromium WebGPU new-headless is real coverage
  # locally, but the GitHub-hosted runner currently drops the device on
  # custom-material tests; keep non-blocking until runner/driver stability is
  # solved. A failure here never blocks a merge — the lane still runs and
  # reports. Run locally via `pnpm test:browser:webgpu`.
  browser-tests-webgpu-chromium:
    name: Browser Tests (Chromium WebGPU, experimental)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (Chromium WebGPU, new headless)
        run: pnpm test:browser:webgpu

  # Optional, non-blocking lane. The Ubuntu CI runner does not give headless
  # Firefox a usable WebGL2 context, and Firefox WebGPU adapter availability
  # varies by runner/display setup. Both Firefox lanes are experimental and
  # kept out of the required gate: a failure here never blocks a merge.
  # Real Firefox coverage runs locally via
  # `pnpm test:browser:webgl:firefox` / `pnpm test:browser:webgpu:firefox`.
  browser-tests-firefox:
    name: Browser Tests (Firefox, experimental)
    needs: [changes]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps firefox

      - name: Browser tests (Firefox WebGL2, headless)
        continue-on-error: true
        run: pnpm test:browser:webgl:firefox

      - name: Browser tests (Firefox WebGPU, headed)
        continue-on-error: true
        run: pnpm test:browser:webgpu:firefox

  package-verify:
    name: Package Build + Verify
    needs: [changes, typecheck, lint]
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Verify package exports
        run: pnpm verify:exports

      - name: Package dry run
        run: pnpm pack --dry-run

  site-build:
    name: Site build
    # Runs whenever site/examples/packages changed. Still ordered after
    # package-verify so a site-only change skips it (package-verify is then
    # "skipped", not "failure"), while a combined change won't waste a site
    # build if the engine package failed to build.
    needs: [changes, package-verify]
    if: ${{ !cancelled() && needs.changes.outputs.site == 'true' && needs.package-verify.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Root install + build are required because the site consumes the local
      # workspace package and vendor:sync reads from the built dist/ tree.
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build library
        run: pnpm build

      # Site build = vendor:sync + examples:sync + astro build.
      - name: Build site
        env:
          EXOJS_PACKAGE_PATH: ..
        run: pnpm site:build

  required-ci:
    name: Required CI
    if: ${{ always() }}
    needs: [changes, typecheck, lint, unit-tests, browser-tests, package-verify, site-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate required job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_TESTS_RESULT: ${{ needs['unit-tests'].result }}
          BROWSER_TESTS_RESULT: ${{ needs['browser-tests'].result }}
          PACKAGE_VERIFY_RESULT: ${{ needs['package-verify'].result }}
          SITE_BUILD_RESULT: ${{ needs['site-build'].result }}
        run: |
          echo "changes: $CHANGES_RESULT"
          echo "typecheck: $TYPECHECK_RESULT"
          echo "lint: $LINT_RESULT"
          echo "unit-tests: $UNIT_TESTS_RESULT"
          echo "browser-tests: $BROWSER_TESTS_RESULT"
          echo "package-verify: $PACKAGE_VERIFY_RESULT"
          echo "site-build: $SITE_BUILD_RESULT"

          # Path filtering can legitimately skip whole lanes (e.g. a docs-only
          # PR skips the engine lanes; an engine-only PR skips the site build),
          # so "skipped" is an acceptable result. Only a real "failure" or
          # "cancelled" fails the gate. The changes job must not be skipped — a
          # skipped detector would silently skip everything and false-green.
          failed=0
          if [ "$CHANGES_RESULT" != "success" ]; then
            failed=1
          fi
          for result in \
            "$TYPECHECK_RESULT" \
            "$LINT_RESULT" \
            "$UNIT_TESTS_RESULT" \
            "$BROWSER_TESTS_RESULT" \
            "$PACKAGE_VERIFY_RESULT" \
            "$SITE_BUILD_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::At least one required CI job failed or was cancelled."
            exit 1
          fi
