name: CI Checks

# Reusable workflow: typecheck -> lint -> test -> build -> verify:exports -> pack,
# then (needs: verify) a site build to confirm the Astro site compiles.
#
# Called by ci.yml and release.yml so both use exactly the same gate.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version passed to setup-node'
        type: string
        default: '24.x'
      ref:
        description: 'Git ref to check out (empty = triggering commit)'
        type: string
        default: ''
      pnpm-version:
        description: 'pnpm version spec (e.g. 11.4.0, 11, latest)'
        type: string
        default: '11.4.0'

permissions:
  contents: read
  # Codecov action posts a coverage comment on PRs.
  pull-requests: write

env:
  CI: true

jobs:
  verify:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Exoridus/ExoJS

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (WebGL2 / Chromium)
        run: pnpm test:browser

      - name: Build
        run: pnpm build

      - name: Verify package exports
        run: pnpm verify:exports

      - name: Package dry run
        run: pnpm pack --dry-run

  site-build:
    name: Site build
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Root install + build are required because site/package.json
      # depends on the library via "file:.." and the vendor:sync script
      # reads from the local dist/ tree.
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build library
        run: pnpm build

      # Site build = vendor:sync + examples:sync + astro build.
      - name: Build site
        env:
          EXOJS_PACKAGE_PATH: ..
        run: pnpm site:build
