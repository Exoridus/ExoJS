name: CI Checks

# Reusable workflow with parallel quality gates (typecheck, lint, unit tests,
# browser tests), plus package verification and a final site build gate.
#
# Called by ci.yml and release.yml so both use exactly the same gate.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version passed to setup-node'
        type: string
        default: '24.x'
      ref:
        description: 'Git ref to check out (empty = triggering commit)'
        type: string
        default: ''
      pnpm-version:
        description: 'pnpm version spec (e.g. 11.4.0, 11, latest)'
        type: string
        default: '11.4.0'

permissions:
  contents: read
  # Codecov action posts a coverage comment on PRs.
  pull-requests: write

env:
  CI: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

  unit-tests:
    name: Unit Tests (Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Exoridus/ExoJS

  browser-tests:
    name: Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Install Xvfb (headed Firefox WebGPU lane)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Browser tests (WebGL2 + WebGPU)
        run: xvfb-run -a pnpm test:browser

  package-verify:
    name: Package Build + Verify
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Verify package exports
        run: pnpm verify:exports

      - name: Package dry run
        run: pnpm pack --dry-run

  site-build:
    name: Site build
    needs: [unit-tests, browser-tests, package-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Root install + build are required because the site consumes the local
      # workspace package and vendor:sync reads from the built dist/ tree.
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build library
        run: pnpm build

      # Site build = vendor:sync + examples:sync + astro build.
      - name: Build site
        env:
          EXOJS_PACKAGE_PATH: ..
        run: pnpm site:build

  required-ci:
    name: Required CI
    if: ${{ always() }}
    needs: [typecheck, lint, unit-tests, browser-tests, package-verify, site-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate required job results
        env:
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_TESTS_RESULT: ${{ needs['unit-tests'].result }}
          BROWSER_TESTS_RESULT: ${{ needs['browser-tests'].result }}
          PACKAGE_VERIFY_RESULT: ${{ needs['package-verify'].result }}
          SITE_BUILD_RESULT: ${{ needs['site-build'].result }}
        run: |
          echo "typecheck: $TYPECHECK_RESULT"
          echo "lint: $LINT_RESULT"
          echo "unit-tests: $UNIT_TESTS_RESULT"
          echo "browser-tests: $BROWSER_TESTS_RESULT"
          echo "package-verify: $PACKAGE_VERIFY_RESULT"
          echo "site-build: $SITE_BUILD_RESULT"

          failed=0
          for result in \
            "$TYPECHECK_RESULT" \
            "$LINT_RESULT" \
            "$UNIT_TESTS_RESULT" \
            "$BROWSER_TESTS_RESULT" \
            "$PACKAGE_VERIFY_RESULT" \
            "$SITE_BUILD_RESULT"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::At least one required CI job did not succeed."
            exit 1
          fi
