name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.6.3)'
        required: true

permissions:
  contents: write
  # Required so npm-cli can mint an OIDC token from GitHub at publish time.
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # `github.ref_name` is the tag name (e.g. `v0.9.0`) for tag-push triggers
  # and `main` for workflow_dispatch. The dispatch input takes priority so
  # an explicitly-passed tag always wins.
  TARGET_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  NODE_VERSION: '24.x'
  PNPM_VERSION: '11.4.0'

jobs:
  # Run the full CI gate (typecheck -> lint -> test -> build -> site-build) at
  # the exact tagged commit before anything is built for release.
  checks:
    name: Verify at tag
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/_ci-checks.yml
    with:
      node-version: '24.x'
      pnpm-version: '11.4.0'
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  # ── Stage 1: PREPARE/VERIFY ────────────────────────────────────────────────
  # Build the four official packages exactly once, then pack/hash/attw/
  # external-consumer/full-zip WITHOUT rebuilding them, and upload the resulting
  # artifacts. Any failure here means no publish, no latest, no tag, no release.
  prepare:
    name: Prepare release artifacts (build-once)
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Refuse to release unless the resolved tag matches package.json.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TARGET_TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$TARGET_TAG' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION."

      # Lockstep + peer-range coherence + deterministic publish-order matrix.
      - name: Verify release package matrix
        run: |
          pnpm verify:lockstep
          pnpm verify:release-matrix

      # Build core + extensions exactly once. `release:prepare --build` invokes
      # `pnpm build` + the four extension builds, then packs WITHOUT rebuilding.
      - name: Build site (vendored ESM for the Full ZIP)
        env:
          EXOJS_PACKAGE_PATH: ..
        run: |
          pnpm build
          pnpm --filter @codexo/exojs-particles build
          pnpm --filter @codexo/exojs-tilemap build
          pnpm --filter @codexo/exojs-tiled build
          pnpm --filter @codexo/exojs-physics build
          pnpm site:build

      # The site build can regenerate tracked content with platform-dependent
      # output (this killed the v0.12.0 and first v0.13.0 release runs with
      # "Working tree is dirty" in freezeRevision). The tag is the source of
      # truth and everything packed comes from untracked dist/ output, so log
      # the drift for diagnosis and reset tracked files to the tag state.
      - name: Reset tracked build side-effects (keep tag tree pristine)
        run: |
          echo "Tracked drift after builds (empty = clean):"
          git status --porcelain
          git checkout -- .

      # Build-once prepare: pack 4 tarballs (no rebuild) -> hash -> manifest +
      # checksums -> attw (bundler) -> external consumers -> Full GitHub ZIP.
      - name: Prepare release (pack, hash, attw, consumers, full-zip)
        run: pnpm release:prepare

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            .release/artifacts/
            .release/exojs-${{ env.TARGET_TAG }}-full.zip
            .release/exojs-${{ env.TARGET_TAG }}-full.zip.sha256
          if-no-files-found: error
          retention-days: 7

  # ── Stage 2: PUBLISH ───────────────────────────────────────────────────────
  # Consumes ONLY the artifacts built by `prepare`. Never builds or repacks: the
  # release:publish step re-hashes the downloaded tarballs against the manifest
  # (build-once guard) and aborts on any drift. Publishes Core -> Particles ->
  # Tilemap -> Tiled to a version-specific temporary dist-tag, then promotes all
  # four to `latest` only after every publish succeeds.
  publish:
    name: Publish to npm (build-once artifacts)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Tooling only (tsx + release scripts). Does NOT build the runtime packages
      # — the tarballs are consumed as-is from the prepare stage.
      - name: Install tooling
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: .release

      # Re-hash guard + ordered publish (Core -> Particles -> Tilemap -> Tiled) to
      # the temporary dist-tag, then promote all four to `latest`. Idempotent: a
      # re-run skips versions already on npm; a partial failure promotes nothing.
      - name: Publish coordinated release (build-once, dist-tag -> latest)
        run: pnpm release:publish --execute

      - name: Generate release notes
        run: |
          pnpm release:notes -- \
            --tag "${TARGET_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --out ".release/release-notes.md"

      - name: Create GitHub release with Full ZIP
        uses: softprops/action-gh-release@v3
        with:
          body_path: .release/release-notes.md
          tag_name: ${{ env.TARGET_TAG }}
          files: |
            .release/exojs-${{ env.TARGET_TAG }}-full.zip
            .release/exojs-${{ env.TARGET_TAG }}-full.zip.sha256
            .release/artifacts/checksums.sha256
            .release/artifacts/release-manifest.json
