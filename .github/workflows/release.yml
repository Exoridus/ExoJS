name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.6.3)'
        required: true

permissions:
  contents: write
  # Required so npm-cli can mint an OIDC-token from GitHub at publish
  # time. The token both (a) authenticates against npm via the package's
  # configured Trusted Publisher (no static NPM_TOKEN secret), and
  # (b) signs the provenance attestation that lands on the npm version
  # page.
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # `github.ref_name` is the tag name (e.g. `v0.9.0`) for tag-push triggers
  # and `main` for workflow_dispatch. The dispatch input takes priority so
  # an explicitly-passed tag always wins.
  TARGET_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Run the full CI gate (typecheck → lint → test → build → site-build) at
  # the exact tagged commit before any publish attempt. Uses Node 22 — the
  # declared LTS target — so the library is verified against the version
  # consumers are most likely running.
  checks:
    name: Verify at tag
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/_ci-checks.yml
    with:
      node-version: '22'
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  publish:
    name: Publish to npm
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_TAG }}

      # Node 24 ships with npm 11+ which is required for Trusted Publisher
      # OIDC authentication. We use Node 22 in the checks job above (library
      # compat) and Node 24 here (npm toolchain requirement).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Refuse to publish unless the resolved tag name matches the
      # version inside package.json. Catches the "tag and package.json
      # drifted" mistake before it ships.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TARGET_TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$TARGET_TAG' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION."

      # `prepack` rebuilds dist/ via rollup; we run it explicitly here so
      # any build failure surfaces before the publish attempt rather than
      # mid-publish.
      - name: Build library
        run: pnpm build

      # Site build produces site/dist/ needed for the release bundle below.
      - name: Build site
        run: pnpm site:build

      - name: Assemble release bundle
        run: |
          BUNDLE_DIR="exojs-${TARGET_TAG}"
          rm -rf "${BUNDLE_DIR}" "${BUNDLE_DIR}.zip"
          mkdir -p "${BUNDLE_DIR}/site"
          cp -R dist "${BUNDLE_DIR}/dist"
          cp -R examples "${BUNDLE_DIR}/examples"
          cp -R site/dist/. "${BUNDLE_DIR}/site/"
          zip -r "${BUNDLE_DIR}.zip" "${BUNDLE_DIR}"

      - name: Generate release notes
        run: |
          pnpm release:notes -- \
            --tag "${TARGET_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --out ".release/release-notes.md"

      - name: Attach release bundle
        uses: softprops/action-gh-release@v3
        with:
          body_path: .release/release-notes.md
          tag_name: ${{ env.TARGET_TAG }}
          files: exojs-${{ env.TARGET_TAG }}.zip

      - name: Publish to npm
        run: npm publish --provenance --access public
