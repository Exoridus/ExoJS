name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.6.3)'
        required: true

permissions:
  contents: read
  # Required so npm-cli can mint an OIDC-token from GitHub at publish
  # time. The token both (a) authenticates against npm via the package's
  # configured Trusted Publisher (no static NPM_TOKEN secret), and
  # (b) signs the provenance attestation that lands on the npm version
  # page.
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Node 24 ships with npm 11+ which is required for Trusted Publisher
  # OIDC authentication. We previously used Node 22 + `npm install -g
  # npm@^11`, but the in-place upgrade has a known MODULE_NOT_FOUND bug
  # on `promise-retry`. Bumping Node is the cleaner fix.
  NODE_VERSION: '24'
  # `github.ref_name` is `main` for workflow_dispatch and the tag name
  # (e.g. `v0.6.3`) for tag-push. The dispatch input takes priority so
  # an explicitly-passed tag wins.
  TARGET_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --fund=false

      # Refuse to publish unless the resolved tag name matches the
      # version inside package.json. Catches the "tag and package.json
      # drifted" mistake before it ships.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TARGET_TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$TARGET_TAG' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION."

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `prepack` rebuilds dist/ via rollup; we run it explicitly here so
      # any build failure surfaces before the publish attempt rather than
      # mid-publish.
      - name: Build
        run: npm run build

      - name: Verify package shape
        run: |
          npm run verify:exports
          npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish --provenance --access public
