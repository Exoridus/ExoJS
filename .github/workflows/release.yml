name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.6.3)'
        required: true

permissions:
  contents: write
  # Required so npm-cli can mint an OIDC token from GitHub at publish time.
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # `github.ref_name` is the tag name (e.g. `v0.9.0`) for tag-push triggers
  # and `main` for workflow_dispatch. The dispatch input takes priority so
  # an explicitly-passed tag always wins.
  TARGET_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  NODE_VERSION: '24.x'
  PNPM_VERSION: '11.4.0'

jobs:
  # Run the full CI gate (typecheck -> lint -> test -> build -> site-build) at
  # the exact tagged commit before any publish attempt.
  checks:
    name: Verify at tag
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/_ci-checks.yml
    with:
      node-version: '24.x'
      pnpm-version: '11.4.0'
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  publish:
    name: Publish to npm
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Refuse to publish unless the resolved tag name matches the
      # version inside package.json. Catches the "tag and package.json
      # drifted" mistake before it ships.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TARGET_TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$TARGET_TAG' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION."

      # `prepack` rebuilds dist/ via rollup; we run it explicitly here so
      # any build failure surfaces before the publish attempt rather than
      # mid-publish.
      - name: Build library
        run: pnpm build

      # Extension packages build their own ESM tree (externalising the core,
      # whose dist/ now exists). Build before packing/publishing so any failure
      # surfaces here, not mid-publish.
      - name: Build extension packages
        run: |
          pnpm --filter @codexo/exojs-particles build
          pnpm --filter @codexo/exojs-tiled build

      # Lockstep + peer-range coherence across all three official packages, plus
      # the deterministic release-matrix / publish-order check. Fails the release
      # before any publish if the package matrix is inconsistent.
      - name: Verify release package matrix
        run: |
          pnpm verify:lockstep
          pnpm verify:release-matrix

      # Site build produces site/dist/ needed for the release bundle below.
      - name: Build site
        env:
          EXOJS_PACKAGE_PATH: ..
        run: pnpm site:build

      # Full coordinated-release archive: all three npm tarballs, every package's
      # distribution, the built site, examples, and top-level metadata. Lets a
      # consumer install the exact coordinated version snapshot offline.
      - name: Assemble release bundle
        run: |
          BUNDLE_DIR="exojs-${TARGET_TAG}-full"
          rm -rf "${BUNDLE_DIR}" "${BUNDLE_DIR}.zip"
          mkdir -p "${BUNDLE_DIR}/site" "${BUNDLE_DIR}/npm" "${BUNDLE_DIR}/packages"
          # npm tarballs for all three official packages (Core → Particles → Tiled).
          npm pack --pack-destination "${BUNDLE_DIR}/npm"
          (cd packages/exojs-particles && npm pack --pack-destination "../../${BUNDLE_DIR}/npm")
          (cd packages/exojs-tiled && npm pack --pack-destination "../../${BUNDLE_DIR}/npm")
          # Distributions.
          cp -R dist "${BUNDLE_DIR}/dist"
          cp -R packages/exojs-particles/dist "${BUNDLE_DIR}/packages/exojs-particles-dist"
          cp -R packages/exojs-tiled/dist "${BUNDLE_DIR}/packages/exojs-tiled-dist"
          # Examples + built site.
          cp -R examples "${BUNDLE_DIR}/examples"
          cp -R site/dist/. "${BUNDLE_DIR}/site/"
          # Top-level metadata.
          cp README.md CHANGELOG.md LICENSE package.json "${BUNDLE_DIR}/"
          zip -r "${BUNDLE_DIR}.zip" "${BUNDLE_DIR}"

      - name: Generate release notes
        run: |
          pnpm release:notes -- \
            --tag "${TARGET_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --out ".release/release-notes.md"

      - name: Attach release bundle
        uses: softprops/action-gh-release@v3
        with:
          body_path: .release/release-notes.md
          tag_name: ${{ env.TARGET_TAG }}
          files: exojs-${{ env.TARGET_TAG }}-full.zip

      # Publish order matters: the core ships first because the extension
      # packages declare it as a peer and the create-exo-app templates depend on
      # `^<this version>`. Each publish is idempotent — a workflow re-run (or a
      # re-triggered tag) skips a version that is already on npm instead of
      # failing — but a genuine publish error fails the step and the whole job,
      # so a partial release can never be reported as success.
      - name: Publish @codexo/exojs to npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "${PKG}@${VER}" version 2>/dev/null || true)" ]; then
            echo "::notice::${PKG}@${VER} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
            echo "::notice::Published ${PKG}@${VER}."
          fi

      # Particles depends on the core peer published above. Same idempotent +
      # fail-on-error contract.
      - name: Publish @codexo/exojs-particles to npm
        working-directory: packages/exojs-particles
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "${PKG}@${VER}" version 2>/dev/null || true)" ]; then
            echo "::notice::${PKG}@${VER} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
            echo "::notice::Published ${PKG}@${VER}."
          fi

      # Tiled is published last of the three official packages.
      - name: Publish @codexo/exojs-tiled to npm
        working-directory: packages/exojs-tiled
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "${PKG}@${VER}" version 2>/dev/null || true)" ]; then
            echo "::notice::${PKG}@${VER} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
            echo "::notice::Published ${PKG}@${VER}."
          fi

      # create-exo-app is versioned independently (0.1.x) and lives in its own
      # workspace package. `npm publish` runs its `prepack` (pnpm build → tsc +
      # shebang), so dist/index.js is built from source at publish time; a build
      # failure surfaces before anything is uploaded. Same OIDC provenance and
      # public access as the core — no extra secrets.
      - name: Publish create-exo-app to npm
        working-directory: packages/create-exo-app
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "${PKG}@${VER}" version 2>/dev/null || true)" ]; then
            echo "::notice::${PKG}@${VER} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
            echo "::notice::Published ${PKG}@${VER}."
          fi
