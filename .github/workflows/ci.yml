name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run the same gate on merge-queue entries so the queue can require it. On a
  # merge_group event select-lanes.mjs (non-PR path) runs every lane, so the
  # queued merge is checked against the full matrix.
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_ci-checks.yml
    # Reusable workflows do NOT see caller secrets by default; without this the
    # Codecov upload runs tokenless and is rejected ("Token required because
    # branch is protected").
    secrets: inherit
