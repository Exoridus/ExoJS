name: Workflow Lint

on:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/dependabot.yml'
  push:
    branches: [main, docs]
    paths:
      - '.github/workflows/*.yml'
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest
