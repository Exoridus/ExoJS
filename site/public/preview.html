<!doctype html>
<html>
    <head>
        <style>
            body,
            html {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: #0b0d12;
            }
            canvas {
                transform: translateZ(0);
                width: 100%;
                height: 100%;
                outline-style: none;
            }
        </style>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var noCache = encodeURIComponent(params.get('no-cache') || String(Date.now()));

                // Select the ExoJS runtime that matches the selected
                // version. The parent shell threads ?v=<id> through
                // EditorPreview.buildIframeUrl. The value lands inside an
                // import-map URL, so reject anything that could escape into
                // path traversal or non-string injection. The sentinel
                // "current" (or missing id) loads the locally-vendored bundle
                // that ships with this Pages deploy; any other id resolves
                // against jsDelivr's npm mirror, where every published
                // release is reachable as @codexo/exojs@<id>.
                var rawVersion = params.get('v') || '';
                var safeVersion = /^[A-Za-z0-9._-]+$/.test(rawVersion) ? rawVersion : '';

                var exoEntry;
                var exoDebugEntry;
                var exoExtensionsEntry;
                var exoRenderingEntry;
                var particlesEntry;
                var particlesRegisterEntry;
                var tiledEntry;
                var tiledRegisterEntry;
                if (!safeVersion || safeVersion === 'current') {
                    exoEntry = './vendor/exojs/esm/index.js?no-cache=' + noCache;
                    exoDebugEntry = './vendor/exojs/esm/debug/index.js?no-cache=' + noCache;
                    exoExtensionsEntry = './vendor/exojs/esm/extensions/index.js?no-cache=' + noCache;
                    exoRenderingEntry = './vendor/exojs/esm/rendering.js?no-cache=' + noCache;
                    particlesEntry = './vendor/exojs-particles/esm/index.js?no-cache=' + noCache;
                    particlesRegisterEntry = './vendor/exojs-particles/esm/register.js?no-cache=' + noCache;
                    tiledEntry = './vendor/exojs-tiled/esm/index.js?no-cache=' + noCache;
                    tiledRegisterEntry = './vendor/exojs-tiled/esm/register.js?no-cache=' + noCache;
                } else {
                    // jsDelivr serves immutable npm tarballs — the version pin
                    // alone is enough, no cache-buster needed.
                    var cdnBase = 'https://cdn.jsdelivr.net/npm/@codexo/';
                    exoEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/index.js';
                    exoDebugEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/debug/index.js';
                    exoExtensionsEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/extensions/index.js';
                    exoRenderingEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/rendering.js';
                    particlesEntry = cdnBase + 'exojs-particles@' + safeVersion + '/dist/esm/index.js';
                    particlesRegisterEntry = cdnBase + 'exojs-particles@' + safeVersion + '/dist/esm/register.js';
                    tiledEntry = cdnBase + 'exojs-tiled@' + safeVersion + '/dist/esm/index.js';
                    tiledRegisterEntry = cdnBase + 'exojs-tiled@' + safeVersion + '/dist/esm/register.js';
                }

                var importMap = {
                    imports: {
                        '@codexo/exojs': exoEntry,
                        '@codexo/exojs/debug': exoDebugEntry,
                        '@codexo/exojs/extensions': exoExtensionsEntry,
                        '@codexo/exojs/rendering': exoRenderingEntry,
                        '@codexo/exojs-particles': particlesEntry,
                        '@codexo/exojs-particles/register': particlesRegisterEntry,
                        '@codexo/exojs-tiled': tiledEntry,
                        '@codexo/exojs-tiled/register': tiledRegisterEntry,
                        '@examples/runtime': './examples/shared/runtime.js?no-cache=' + noCache,
                    },
                };
                var script = document.createElement('script');

                script.type = 'importmap';
                script.textContent = JSON.stringify(importMap);
                document.currentScript.after(script);
            })();
        </script>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="shortcut icon" href="favicon.ico" />
    </head>
    <body>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var sourceKey = params.get('source-key');
                if (!sourceKey) return;

                var source = null;
                try {
                    source = window.sessionStorage.getItem(sourceKey);
                    window.sessionStorage.removeItem(sourceKey);
                } catch {
                    source = null;
                }

                if (!source) return;

                var script = document.createElement('script');
                script.type = 'module';
                script.textContent = source + '\n';
                document.body.appendChild(script);
            })();
        </script>
    </body>
</html>
