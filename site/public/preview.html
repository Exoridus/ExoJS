<!doctype html>
<html>
    <head>
        <style>
            html {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #0b0d12;
            }
            /* The example mounts its canvas and DOM overlays into <body>. We make
               <body> a fixed 1280x720 "stage" so every example keeps the same
               coordinate space, then uniformly scale that stage to fit the iframe.
               Because a CSS transform establishes the containing block for
               position:fixed, the example's overlays (mountControls) scale and
               stay aligned with the canvas instead of being clipped by a letterbox
               — and nothing needs to change per example. */
            body {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 1280px;
                height: 720px;
                margin: 0;
                transform: translate(-50%, -50%) scale(var(--preview-scale, 1));
                transform-origin: center center;
            }
            canvas {
                outline-style: none;
            }
        </style>
        <script>
            // Fit the 1280x720 stage to the iframe while preserving 16:9 — scale
            // by the limiting dimension so the stage (canvas + overlays) never
            // overflows or clips. Recomputed on every iframe resize.
            (function () {
                function fitStage() {
                    var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                    document.documentElement.style.setProperty('--preview-scale', String(scale));
                }
                window.addEventListener('resize', fitStage);
                fitStage();
            })();
        </script>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var noCache = encodeURIComponent(params.get('no-cache') || String(Date.now()));

                // Select the ExoJS runtime that matches the selected
                // version. The parent shell threads ?v=<id> through
                // EditorPreview.buildIframeUrl. The value lands inside an
                // import-map URL, so reject anything that could escape into
                // path traversal or non-string injection. The sentinel
                // "current" (or missing id) loads the locally-vendored bundle
                // that ships with this Pages deploy; any other id resolves
                // against jsDelivr's npm mirror, where every published
                // release is reachable as @codexo/exojs@<id>.
                var rawVersion = params.get('v') || '';
                var safeVersion = /^[A-Za-z0-9._-]+$/.test(rawVersion) ? rawVersion : '';

                var exoEntry;
                var exoDebugEntry;
                var exoExtensionsEntry;
                var exoRenderingEntry;
                var exoRendererSdkEntry;
                var particlesEntry;
                var particlesRegisterEntry;
                var audioFxEntry;
                var tiledEntry;
                var tiledRegisterEntry;
                var tilemapEntry;
                var tilemapRegisterEntry;
                var ldtkEntry;
                var ldtkRegisterEntry;
                var physicsEntry;
                var physicsDebugEntry;
                if (!safeVersion || safeVersion === 'current') {
                    exoEntry = './vendor/exojs/esm/index.js?no-cache=' + noCache;
                    exoDebugEntry = './vendor/exojs/esm/debug/index.js?no-cache=' + noCache;
                    exoExtensionsEntry = './vendor/exojs/esm/extensions/index.js?no-cache=' + noCache;
                    exoRenderingEntry = './vendor/exojs/esm/rendering.js?no-cache=' + noCache;
                    exoRendererSdkEntry = './vendor/exojs/esm/renderer-sdk.js?no-cache=' + noCache;
                    particlesEntry = './vendor/exojs-particles/esm/index.js?no-cache=' + noCache;
                    particlesRegisterEntry = './vendor/exojs-particles/esm/register.js?no-cache=' + noCache;
                    audioFxEntry = './vendor/exojs-audio-fx/esm/index.js?no-cache=' + noCache;
                    tiledEntry = './vendor/exojs-tiled/esm/index.js?no-cache=' + noCache;
                    tiledRegisterEntry = './vendor/exojs-tiled/esm/register.js?no-cache=' + noCache;
                    tilemapEntry = './vendor/exojs-tilemap/esm/index.js?no-cache=' + noCache;
                    tilemapRegisterEntry = './vendor/exojs-tilemap/esm/register.js?no-cache=' + noCache;
                    ldtkEntry = './vendor/exojs-ldtk/esm/index.js?no-cache=' + noCache;
                    ldtkRegisterEntry = './vendor/exojs-ldtk/esm/register.js?no-cache=' + noCache;
                    physicsEntry = './vendor/exojs-physics/esm/index.js?no-cache=' + noCache;
                    physicsDebugEntry = './vendor/exojs-physics/esm/debug/index.js?no-cache=' + noCache;
                } else {
                    // jsDelivr serves immutable npm tarballs — the version pin
                    // alone is enough, no cache-buster needed.
                    var cdnBase = 'https://cdn.jsdelivr.net/npm/@codexo/';
                    exoEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/index.js';
                    exoDebugEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/debug/index.js';
                    exoExtensionsEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/extensions/index.js';
                    exoRenderingEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/rendering.js';
                    exoRendererSdkEntry = cdnBase + 'exojs@' + safeVersion + '/dist/esm/renderer-sdk.js';
                    particlesEntry = cdnBase + 'exojs-particles@' + safeVersion + '/dist/esm/index.js';
                    particlesRegisterEntry = cdnBase + 'exojs-particles@' + safeVersion + '/dist/esm/register.js';
                    audioFxEntry = cdnBase + 'exojs-audio-fx@' + safeVersion + '/dist/esm/index.js';
                    tiledEntry = cdnBase + 'exojs-tiled@' + safeVersion + '/dist/esm/index.js';
                    tiledRegisterEntry = cdnBase + 'exojs-tiled@' + safeVersion + '/dist/esm/register.js';
                    tilemapEntry = cdnBase + 'exojs-tilemap@' + safeVersion + '/dist/esm/index.js';
                    tilemapRegisterEntry = cdnBase + 'exojs-tilemap@' + safeVersion + '/dist/esm/register.js';
                    ldtkEntry = cdnBase + 'exojs-ldtk@' + safeVersion + '/dist/esm/index.js';
                    ldtkRegisterEntry = cdnBase + 'exojs-ldtk@' + safeVersion + '/dist/esm/register.js';
                    physicsEntry = cdnBase + 'exojs-physics@' + safeVersion + '/dist/esm/index.js';
                    physicsDebugEntry = cdnBase + 'exojs-physics@' + safeVersion + '/dist/esm/debug/index.js';
                }

                var importMap = {
                    imports: {
                        '@codexo/exojs': exoEntry,
                        '@codexo/exojs/debug': exoDebugEntry,
                        '@codexo/exojs/extensions': exoExtensionsEntry,
                        '@codexo/exojs/rendering': exoRenderingEntry,
                        '@codexo/exojs/renderer-sdk': exoRendererSdkEntry,
                        '@codexo/exojs-particles': particlesEntry,
                        '@codexo/exojs-particles/register': particlesRegisterEntry,
                        '@codexo/exojs-audio-fx': audioFxEntry,
                        '@codexo/exojs-tiled': tiledEntry,
                        '@codexo/exojs-tiled/register': tiledRegisterEntry,
                        '@codexo/exojs-tilemap': tilemapEntry,
                        '@codexo/exojs-tilemap/register': tilemapRegisterEntry,
                        '@codexo/exojs-ldtk': ldtkEntry,
                        '@codexo/exojs-ldtk/register': ldtkRegisterEntry,
                        '@codexo/exojs-physics': physicsEntry,
                        '@codexo/exojs-physics/debug': physicsDebugEntry,
                        '@examples/runtime': './examples/shared/runtime.js?no-cache=' + noCache,
                        '@examples/physics-tilemap': './examples/shared/physics-tilemap.js?no-cache=' + noCache,
                    },
                };
                var script = document.createElement('script');

                script.type = 'importmap';
                script.textContent = JSON.stringify(importMap);
                document.currentScript.after(script);
            })();
        </script>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="shortcut icon" href="favicon.ico" />
    </head>
    <body>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var sourceKey = params.get('source-key');
                if (!sourceKey) return;

                var source = null;
                try {
                    source = window.sessionStorage.getItem(sourceKey);
                    window.sessionStorage.removeItem(sourceKey);
                } catch {
                    source = null;
                }

                if (!source) return;

                var script = document.createElement('script');
                script.type = 'module';
                script.textContent = source + '\n';
                document.body.appendChild(script);
            })();
        </script>
    </body>
</html>
