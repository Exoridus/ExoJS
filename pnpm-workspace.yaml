packages:
  - site
  - packages/exojs-config
  - packages/exojs-particles
  - packages/exojs-tiled
  - packages/create-exo-app

# Packages permitted to run install/build scripts. pnpm v10+ blocks build
# scripts by default and prompts for approval; this is the explicit allowlist.
# CI installs with --ignore-scripts and is unaffected by this.
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
