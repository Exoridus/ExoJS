packages:
  - site
  - packages/exojs-config
  - packages/exojs-particles
  - packages/exojs-tilemap
  - packages/exojs-tiled
  - packages/exojs-aseprite
  - packages/exojs-ldtk
  - packages/exojs-physics
  - packages/exojs-react
  - packages/exojs-audio-fx
  - packages/create-exo-app

# Packages permitted to run install/build scripts. pnpm v10+ blocks build
# scripts by default and prompts for approval; this is the explicit allowlist.
# CI installs with --ignore-scripts and is unaffected by this.
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true

# Supply-chain defense: refuse to install any package version younger than this
# (minutes → 3 days). The real npm compromises of recent memory published a
# malicious version and yanked it within hours; this quarantines brand-new
# versions on every install — local AND CI — complementing the Dependabot
# cooldown (which only governs Dependabot's own PRs, not manual installs).
# `--frozen-lockfile` installs of already-pinned versions are unaffected.
minimumReleaseAge: 4320
