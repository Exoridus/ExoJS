<!doctype html>
<html>
    <head>
        <style>
            body, html {
                margin: 0;
                height: 100%;
                overflow: hidden;
            }
            canvas {
                transform: translateZ(0);
                width: 100%;
                height: 100%;
                outline-style: none;
            }
        </style>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var noCache = encodeURIComponent(params.get('no-cache') || String(Date.now()));

                // Select the ExoJS runtime snapshot that matches the selected
                // version. The parent shell threads ?v=<id> through
                // EditorPreview.buildIframeUrl. The value lands inside an
                // import-map URL, so reject anything that could escape into
                // path traversal or non-string injection. On a missing or
                // unsafe id, fall back to the flat vendor path for direct
                // preview.html opens and older deployed shells.
                var rawVersion = params.get('v') || '';
                var safeVersion = /^[A-Za-z0-9._-]+$/.test(rawVersion) ? rawVersion : '';

                var exoEntry = safeVersion
                    ? './vendor/exojs/' + safeVersion + '/exo.esm.js?no-cache=' + noCache
                    : './vendor/exojs/exo.esm.js?no-cache=' + noCache;

                var importMap = {
                    imports: {
                        '@codexo/exojs': exoEntry,
                        '@examples/runtime': './examples/shared/runtime.js?no-cache=' + noCache
                    }
                };
                var script = document.createElement('script');

                script.type = 'importmap';
                script.textContent = JSON.stringify(importMap);
                document.currentScript.after(script);
            })();
        </script>
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="shortcut icon" href="favicon.ico">
    </head>
    <body></body>
</html>
